<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drafted — project boards</title>
<style>
  :root{
    --ink:#1B2430;
    --paper:#F7F4EC;
    --paper-2:#EFEADE;
    --card:#FFFFFF;
    --blue:#3457D5;
    --blue-dark:#23399A;
    --terracotta:#D6643C;
    --green:#2F8F5B;
    --red:#C0392B;
    --line:#D8D3C4;
    --line-strong:#B9B2A0;
    --muted:#6B6457;
    --shadow: 0 1px 0 rgba(27,36,48,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    background-image:
      linear-gradient(rgba(27,36,48,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(27,36,48,0.035) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  #app{min-height:100vh;display:flex;flex-direction:column;}
  ::selection{background:var(--blue);color:#fff;}

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 28px;
    background:var(--ink);
    color:var(--paper);
    border-bottom:3px solid var(--blue);
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;letter-spacing:0.3px;}
  .brand .mark{
    width:26px;height:26px;border:2px solid var(--terracotta);border-radius:4px;
    display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--terracotta);font-weight:800;
  }
  .topbar-right{display:flex;align-items:center;gap:18px;}
  .icon-btn{
    background:transparent;border:1px solid rgba(247,244,236,0.25);color:var(--paper);
    width:36px;height:36px;border-radius:6px;cursor:pointer;position:relative;font-size:16px;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{border-color:var(--terracotta);}
  .badge-dot{
    position:absolute;top:-4px;right:-4px;background:var(--terracotta);color:#fff;font-size:10px;font-weight:700;
    border-radius:50%;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px;
  }
  .avatar{
    width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:700;
    display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--terracotta);
  }

  /* ---------- Layout ---------- */
  .layout{flex:1;display:flex;}
  .sidebar{
    width:240px;flex-shrink:0;background:var(--card);border-right:1px solid var(--line);padding:20px 14px;
  }
  .sidebar h4{
    font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:18px 8px 8px;font-weight:700;
  }
  .sidebar h4:first-child{margin-top:0;}
  .project-item{
    display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;cursor:pointer;font-size:14px;
    color:var(--ink);border-left:3px solid transparent;
  }
  .project-item:hover{background:var(--paper);}
  .project-item.active{background:#EAF0FE;border-left-color:var(--blue);font-weight:700;}
  .project-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
  .new-project-btn{
    width:100%;margin-top:10px;padding:9px 10px;border-radius:6px;border:1.5px dashed var(--line-strong);
    background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;text-align:left;
  }
  .new-project-btn:hover{border-color:var(--blue);color:var(--blue);}

  .main{flex:1;padding:24px 32px;overflow-x:auto;}

  /* ---------- Board header ---------- */
  .board-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
  .board-title{font-size:24px;font-weight:800;margin:0 0 4px;}
  .board-sub{font-size:13px;color:var(--muted);margin:0;}
  .members-row{display:flex;align-items:center;gap:6px;}
  .mini-avatar{
    width:28px;height:28px;border-radius:50%;color:#fff;font-size:11px;font-weight:700;
    display:flex;align-items:center;justify-content:center;border:2px solid var(--paper);margin-left:-8px;
  }
  .mini-avatar:first-child{margin-left:0;}
  .add-member-btn{
    width:28px;height:28px;border-radius:50%;border:1.5px dashed var(--line-strong);background:#fff;color:var(--muted);
    cursor:pointer;font-size:14px;margin-left:-8px;
  }

  /* ---------- Columns ---------- */
  .board{display:flex;gap:18px;align-items:flex-start;}
  .column{
    width:280px;flex-shrink:0;background:rgba(255,255,255,0.6);border:1px solid var(--line);border-radius:10px;
    padding:12px;
  }
  .column.drag-over{border-color:var(--blue);background:#EAF0FE;}
  .column-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px;}
  .column-head-left{display:flex;align-items:center;gap:8px;}
  .column-flag{width:8px;height:8px;border-radius:2px;}
  .column-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
  .column-count{font-size:11px;color:var(--muted);background:var(--paper);padding:1px 7px;border-radius:10px;}
  .card-list{min-height:30px;display:flex;flex-direction:column;gap:10px;}

  .task-card{
    background:var(--card);border:1px solid var(--line);border-radius:8px;padding:11px 12px;cursor:grab;
    box-shadow:var(--shadow);position:relative;
  }
  .task-card:active{cursor:grabbing;}
  .task-card.dragging{opacity:0.4;}
  .task-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .task-title{font-size:13.5px;font-weight:600;line-height:1.35;}
  .priority-tag{
    font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:0.3px;
    white-space:nowrap;
  }
  .priority-high{background:#FBE4DD;color:var(--terracotta);}
  .priority-med{background:#FFF3D6;color:#9A6B00;}
  .priority-low{background:#E3EFE7;color:var(--green);}
  .task-meta{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
  .task-meta-left{display:flex;align-items:center;gap:10px;font-size:11.5px;color:var(--muted);}
  .task-due{display:flex;align-items:center;gap:4px;}
  .task-due.overdue{color:var(--red);font-weight:700;}
  .comment-count{display:flex;align-items:center;gap:3px;}
  .task-assignees{display:flex;}
  .task-assignees .mini-avatar{width:22px;height:22px;font-size:9.5px;}

  .add-card-btn{
    width:100%;text-align:left;padding:8px 6px;background:transparent;border:none;color:var(--muted);
    font-size:13px;cursor:pointer;border-radius:6px;font-weight:600;
  }
  .add-card-btn:hover{background:var(--paper);color:var(--blue);}

  /* ---------- New card inline form ---------- */
  .inline-form{background:var(--card);border:1px solid var(--blue);border-radius:8px;padding:8px;}
  .inline-form textarea{
    width:100%;border:none;outline:none;resize:none;font-size:13.5px;font-family:inherit;min-height:50px;
  }
  .inline-form-actions{display:flex;gap:8px;margin-top:6px;}

  /* ---------- Buttons ---------- */
  .btn{
    padding:8px 14px;border-radius:6px;border:1px solid var(--line-strong);background:#fff;color:var(--ink);
    cursor:pointer;font-size:13px;font-weight:700;
  }
  .btn:hover{border-color:var(--blue);color:var(--blue);}
  .btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;}
  .btn-primary:hover{background:var(--blue-dark);color:#fff;}
  .btn-text{background:transparent;border:none;color:var(--muted);font-weight:600;}
  .btn-text:hover{color:var(--ink);}
  .btn-sm{padding:5px 10px;font-size:12px;}

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(27,36,48,0.45);display:flex;align-items:flex-start;justify-content:center;
    padding:48px 20px;z-index:50;overflow-y:auto;
  }
  .modal{
    background:var(--card);border-radius:12px;width:560px;max-width:100%;box-shadow:0 12px 40px rgba(0,0,0,0.25);
  }
  .modal-small{width:380px;}
  .modal-header{
    display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line);
  }
  .modal-header h3{margin:0;font-size:17px;font-weight:800;}
  .modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);}
  .modal-body{padding:20px 22px;}
  .field-label{font-size:11px;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);font-weight:700;margin-bottom:6px;display:block;}
  .field{margin-bottom:16px;}
  .field input, .field select, .field textarea{
    width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:6px;font-size:14px;font-family:inherit;
    outline:none;
  }
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--blue);}
  .field textarea{min-height:70px;resize:vertical;}
  .assignee-picker{display:flex;flex-wrap:wrap;gap:8px;}
  .assignee-chip{
    display:flex;align-items:center;gap:6px;padding:5px 10px 5px 5px;border-radius:20px;border:1.5px solid var(--line);
    cursor:pointer;font-size:12.5px;font-weight:600;
  }
  .assignee-chip.selected{border-color:var(--blue);background:#EAF0FE;color:var(--blue-dark);}
  .assignee-chip .mini-avatar{margin:0;width:20px;height:20px;font-size:9px;border:none;}

  .comment-list{display:flex;flex-direction:column;gap:14px;margin:14px 0;}
  .comment{display:flex;gap:10px;}
  .comment-body{flex:1;}
  .comment-head{display:flex;align-items:baseline;gap:8px;margin-bottom:2px;}
  .comment-author{font-weight:700;font-size:13px;}
  .comment-time{font-size:11px;color:var(--muted);}
  .comment-text{font-size:13.5px;line-height:1.5;}
  .comment-input-row{display:flex;gap:10px;margin-top:14px;align-items:flex-start;}
  .comment-input-row textarea{flex:1;min-height:40px;}

  .activity-feed{display:flex;flex-direction:column;gap:2px;}
  .activity-item{
    display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px;
  }
  .activity-item:last-child{border-bottom:none;}
  .activity-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
  .activity-text strong{font-weight:700;}
  .activity-time{font-size:11px;color:var(--muted);margin-top:2px;}

  .empty-state{
    text-align:center;padding:60px 20px;color:var(--muted);
  }
  .empty-state .mark-lg{
    width:48px;height:48px;border:2px dashed var(--line-strong);border-radius:8px;margin:0 auto 14px;
  }

  .toast-stack{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:80;}
  .toast{
    background:var(--ink);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);border-left:3px solid var(--terracotta);
  }

  /* ---------- Auth screen ---------- */
  .auth-wrap{
    flex:1;display:flex;align-items:center;justify-content:center;
  }
  .auth-card{
    width:380px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:32px;
    box-shadow:0 6px 24px rgba(27,36,48,0.08);
  }
  .auth-brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .auth-brand .mark{
    width:30px;height:30px;border:2px solid var(--terracotta);border-radius:5px;color:var(--terracotta);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;
  }
  .auth-title{font-size:19px;font-weight:800;margin:0;}
  .auth-sub{color:var(--muted);font-size:13px;margin:4px 0 24px;}
  .auth-toggle{display:flex;gap:6px;margin-bottom:20px;background:var(--paper);padding:4px;border-radius:8px;}
  .auth-toggle button{
    flex:1;padding:8px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-weight:700;font-size:13px;color:var(--muted);
  }
  .auth-toggle button.active{background:#fff;color:var(--ink);box-shadow:var(--shadow);}
  .auth-error{background:#FBE4DD;color:var(--terracotta);font-size:12.5px;padding:8px 10px;border-radius:6px;margin-bottom:14px;font-weight:600;}
  .auth-full-btn{width:100%;padding:11px;margin-top:4px;}
  .auth-hint{font-size:11.5px;color:var(--muted);margin-top:16px;text-align:center;line-height:1.5;}

  .notif-panel{
    position:absolute;top:54px;right:96px;width:320px;background:var(--card);border:1px solid var(--line);
    border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,0.2);z-index:60;max-height:420px;overflow-y:auto;
  }
  .notif-head{padding:12px 16px;border-bottom:1px solid var(--line);font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
  .notif-item{padding:11px 16px;border-bottom:1px solid var(--line);font-size:12.5px;display:flex;gap:9px;}
  .notif-item:last-child{border-bottom:none;}
  .notif-item.unread{background:#F8FAFE;}
  .notif-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);margin-top:6px;flex-shrink:0;}

  .scope-note{
    font-size:11px;color:var(--muted);padding:10px 14px;background:#FFF7E8;border:1px solid #F0DDB0;border-radius:8px;
    margin-bottom:18px;
  }

  @media (max-width:760px){
    .sidebar{display:none;}
    .main{padding:16px;}
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-stack" id="toastStack"></div>

<script>
/* ================= MOCK DATA / STATE ================= */
const PALETTE = ['#3457D5','#D6643C','#2F8F5B','#9A6B00','#7E57C2','#C0392B'];

const USERS = [
  {id:'u1', name:'Maya Chen', initials:'MC', color:'#3457D5'},
  {id:'u2', name:'Liam Brooks', initials:'LB', color:'#D6643C'},
  {id:'u3', name:'Aisha Patel', initials:'AP', color:'#2F8F5B'},
  {id:'u4', name:'Diego Ruiz', initials:'DR', color:'#7E57C2'},
];

let state = {
  currentUser: null,
  view: 'auth', // auth | dashboard
  activeProjectId: null,
  notifOpen: false,
  notifications: [],
  projects: [
    {
      id:'p1', name:'Launch Marketing Site', color:'#3457D5',
      members:['u1','u2','u3'],
      columns:[
        {id:'c1', name:'Backlog', flag:'#6B6457'},
        {id:'c2', name:'In progress', flag:'#3457D5'},
        {id:'c3', name:'Review', flag:'#D6643C'},
        {id:'c4', name:'Done', flag:'#2F8F5B'},
      ],
      tasks:[
        {id:'t1', columnId:'c1', title:'Draft homepage copy', priority:'med', assignees:['u1'], due:'2026-07-04', comments:[
          {id:'cm1', userId:'u2', text:'Should we lead with the pricing or the product story?', time:'2 days ago'}
        ]},
        {id:'t2', columnId:'c1', title:'Source hero photography', priority:'low', assignees:[], due:null, comments:[]},
        {id:'t3', columnId:'c2', title:'Build pricing page', priority:'high', assignees:['u2','u3'], due:'2026-07-02', comments:[
          {id:'cm2', userId:'u3', text:'First pass is up on staging, ready for a look.', time:'5 hours ago'},
          {id:'cm3', userId:'u1', text:'Looks great, just tighten the spacing on mobile.', time:'1 hour ago'}
        ]},
        {id:'t4', columnId:'c3', title:'Accessibility pass on nav', priority:'med', assignees:['u1'], due:'2026-06-29', comments:[]},
        {id:'t5', columnId:'c4', title:'Set up analytics events', priority:'low', assignees:['u3'], due:null, comments:[]},
      ]
    },
    {
      id:'p2', name:'Mobile App v2', color:'#D6643C',
      members:['u1','u4'],
      columns:[
        {id:'c5', name:'Backlog', flag:'#6B6457'},
        {id:'c6', name:'In progress', flag:'#3457D5'},
        {id:'c7', name:'Done', flag:'#2F8F5B'},
      ],
      tasks:[
        {id:'t6', columnId:'c5', title:'Spec offline sync behavior', priority:'high', assignees:['u4'], due:'2026-07-10', comments:[]},
        {id:'t7', columnId:'c6', title:'Implement push notifications', priority:'med', assignees:['u1','u4'], due:null, comments:[]},
      ]
    }
  ]
};

let draggedTaskId = null;
let newCardColumnId = null;

/* ================= UTIL ================= */
function uid(prefix){ return prefix + Math.random().toString(36).slice(2,9); }
function userById(id){ return USERS.find(u=>u.id===id); }
function findProject(id){ return state.projects.find(p=>p.id===id); }
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }
function escapeHtml(s){ const d=document.createElement('div'); d.innerText=s; return d.innerHTML; }

function pushToast(msg){
  const stack = document.getElementById('toastStack');
  const t = el(`<div class="toast">${escapeHtml(msg)}</div>`);
  stack.appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}

function pushNotification(text){
  state.notifications.unshift({id:uid('n'), text, time:'just now', unread:true});
  if(state.view==='dashboard') renderTopbarOnly();
}

/* ================= SIMULATED REAL-TIME ================= */
const SIM_EVENTS = [
  ()=> `Liam Brooks moved "Build pricing page" to Review`,
  ()=> `Aisha Patel commented on "Set up analytics events"`,
  ()=> `Diego Ruiz assigned you to "Implement push notifications"`,
  ()=> `Maya Chen completed "Accessibility pass on nav"`,
];
setInterval(()=>{
  if(state.currentUser && state.view==='dashboard'){
    const text = SIM_EVENTS[Math.floor(Math.random()*SIM_EVENTS.length)]();
    pushNotification(text);
    pushToast(text);
  }
}, 22000);

/* ================= RENDER ROOT ================= */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  if(state.view==='auth'){
    app.appendChild(renderAuth());
  } else {
    app.appendChild(renderTopbar());
    const layout = el(`<div class="layout"></div>`);
    layout.appendChild(renderSidebar());
    layout.appendChild(renderMain());
    app.appendChild(layout);
  }
}

function renderTopbarOnly(){
  const old = document.querySelector('.topbar');
  if(old) old.replaceWith(renderTopbar());
}

/* ================= AUTH ================= */
let authMode = 'login';
let authError = '';

function renderAuth(){
  const wrap = el(`<div class="auth-wrap"></div>`);
  const card = el(`
    <div class="auth-card">
      <div class="auth-brand"><div class="mark">D</div><div class="auth-title">Drafted</div></div>
      <p class="auth-sub">Plan projects, assign work, and keep every conversation next to the task.</p>
      <div class="auth-toggle">
        <button id="tabLogin" class="${authMode==='login'?'active':''}">Log in</button>
        <button id="tabSignup" class="${authMode==='signup'?'active':''}">Sign up</button>
      </div>
      ${authError ? `<div class="auth-error">${escapeHtml(authError)}</div>` : ''}
      <div class="field"><label class="field-label">Name</label><input id="authName" type="text" placeholder="Maya Chen" value="Maya Chen"></div>
      <div class="field"><label class="field-label">Email</label><input id="authEmail" type="email" placeholder="maya@studio.com" value="maya@studio.com"></div>
      <div class="field"><label class="field-label">Password</label><input id="authPass" type="password" placeholder="••••••••" value="••••••••"></div>
      <button class="btn btn-primary auth-full-btn" id="authSubmit">${authMode==='login'?'Log in':'Create account'}</button>
      <p class="auth-hint">This prototype simulates authentication in the browser. A production build would verify credentials against a server and issue a session token.</p>
    </div>
  `);
  wrap.appendChild(card);

  wrap.querySelector('#tabLogin').onclick = ()=>{ authMode='login'; authError=''; render(); };
  wrap.querySelector('#tabSignup').onclick = ()=>{ authMode='signup'; authError=''; render(); };
  wrap.querySelector('#authSubmit').onclick = ()=>{
    const name = wrap.querySelector('#authName').value.trim();
    const email = wrap.querySelector('#authEmail').value.trim();
    if(!name || !email){ authError = 'Enter a name and email to continue.'; render(); return; }
    state.currentUser = USERS[0]; // logged in as Maya Chen for demo
    state.activeProjectId = state.projects[0].id;
    state.notifications = [
      {id:uid('n'), text:'Liam Brooks commented on "Build pricing page"', time:'1 hour ago', unread:true},
      {id:uid('n'), text:'You were assigned to "Draft homepage copy"', time:'yesterday', unread:false},
    ];
    state.view = 'dashboard';
    render();
  };
  return wrap;
}

/* ================= TOPBAR ================= */
function renderTopbar(){
  const unread = state.notifications.filter(n=>n.unread).length;
  const bar = el(`
    <div class="topbar">
      <div class="brand"><div class="mark">D</div>Drafted</div>
      <div class="topbar-right" style="position:relative;">
        <button class="icon-btn" id="notifBtn" aria-label="Notifications">
          &#128276;
          ${unread>0 ? `<span class="badge-dot">${unread}</span>` : ''}
        </button>
        <div class="avatar" id="userAvatar" title="${state.currentUser.name}">${state.currentUser.initials}</div>
      </div>
    </div>
  `);
  bar.querySelector('#notifBtn').onclick = (e)=>{
    e.stopPropagation();
    state.notifOpen = !state.notifOpen;
    state.notifications.forEach(n=>n.unread=false);
    closePanelsThenRender();
  };
  bar.querySelector('#userAvatar').onclick = ()=>{
    state.currentUser=null; state.view='auth'; state.notifications=[]; render();
  };
  if(state.notifOpen){
    const panel = el(`
      <div class="notif-panel">
        <div class="notif-head"><span>Notifications</span></div>
        ${state.notifications.length===0 ? `<div class="notif-item">You're all caught up.</div>` :
          state.notifications.map(n=>`
            <div class="notif-item ${n.unread?'unread':''}">
              <div class="notif-dot"></div>
              <div><div>${escapeHtml(n.text)}</div><div class="activity-time">${escapeHtml(n.time)}</div></div>
            </div>
          `).join('')}
      </div>
    `);
    bar.appendChild(panel);
  }
  return bar;
}

function closePanelsThenRender(){
  render();
  setTimeout(()=>{
    document.addEventListener('click', function handler(){
      state.notifOpen = false;
      render();
      document.removeEventListener('click', handler);
    }, {once:true});
  }, 0);
}

/* ================= SIDEBAR ================= */
function renderSidebar(){
  const side = el(`<div class="sidebar"></div>`);
  side.appendChild(el(`<h4>Your projects</h4>`));
  state.projects.forEach(p=>{
    const item = el(`
      <div class="project-item ${p.id===state.activeProjectId?'active':''}">
        <div class="project-dot" style="background:${p.color}"></div>
        <span>${escapeHtml(p.name)}</span>
      </div>
    `);
    item.onclick = ()=>{ state.activeProjectId = p.id; render(); };
    side.appendChild(item);
  });
  const newBtn = el(`<button class="new-project-btn">+ New project</button>`);
  newBtn.onclick = ()=> openNewProjectModal();
  side.appendChild(newBtn);

  side.appendChild(el(`<h4>Workspace</h4>`));
  side.appendChild(el(`<div class="project-item"><span>Activity feed</span></div>`)).onclick = ()=> openActivityModal();
  return side;
}

/* ================= MAIN / BOARD ================= */
function renderMain(){
  const main = el(`<div class="main"></div>`);
  const project = findProject(state.activeProjectId);
  if(!project){
    main.appendChild(el(`
      <div class="empty-state">
        <div class="mark-lg"></div>
        <p>Create a project to start assigning work.</p>
      </div>
    `));
    return main;
  }

  const header = el(`
    <div class="board-header">
      <div>
        <h2 class="board-title">${escapeHtml(project.name)}</h2>
        <p class="board-sub">${project.tasks.length} tasks across ${project.columns.length} stages</p>
      </div>
      <div class="members-row" id="membersRow"></div>
    </div>
  `);
  const membersRow = header.querySelector('#membersRow');
  project.members.forEach(uidv=>{
    const u = userById(uidv);
    membersRow.appendChild(el(`<div class="mini-avatar" style="background:${u.color}" title="${u.name}">${u.initials}</div>`));
  });
  const addMember = el(`<button class="add-member-btn" title="Add member">+</button>`);
  addMember.onclick = ()=> openAddMemberModal(project);
  membersRow.appendChild(addMember);
  main.appendChild(header);

  main.appendChild(el(`
    <div class="scope-note">This board updates instantly for everyone with access — comments, moves, and assignments simulate live WebSocket sync across collaborators.</div>
  `));

  const board = el(`<div class="board"></div>`);
  project.columns.forEach(col=>{
    board.appendChild(renderColumn(project, col));
  });
  main.appendChild(board);
  return main;
}

function renderColumn(project, col){
  const tasks = project.tasks.filter(t=>t.columnId===col.id);
  const column = el(`
    <div class="column" data-col="${col.id}">
      <div class="column-head">
        <div class="column-head-left">
          <div class="column-flag" style="background:${col.flag}"></div>
          <span class="column-title">${escapeHtml(col.name)}</span>
        </div>
        <span class="column-count">${tasks.length}</span>
      </div>
      <div class="card-list"></div>
    </div>
  `);
  const list = column.querySelector('.card-list');
  tasks.forEach(t=> list.appendChild(renderTaskCard(project, t)));

  if(newCardColumnId === col.id){
    list.appendChild(renderInlineForm(project, col));
  } else {
    const addBtn = el(`<button class="add-card-btn">+ Add a task</button>`);
    addBtn.onclick = ()=>{ newCardColumnId = col.id; render(); };
    column.appendChild(addBtn);
  }

  // drag and drop
  column.addEventListener('dragover', e=>{ e.preventDefault(); column.classList.add('drag-over'); });
  column.addEventListener('dragleave', ()=> column.classList.remove('drag-over'));
  column.addEventListener('drop', e=>{
    e.preventDefault();
    column.classList.remove('drag-over');
    if(draggedTaskId){
      const task = project.tasks.find(t=>t.id===draggedTaskId);
      if(task && task.columnId !== col.id){
        task.columnId = col.id;
        pushToast(`Moved "${task.title}" to ${col.name}`);
        render();
      }
    }
  });

  return column;
}

function renderInlineForm(project, col){
  const form = el(`
    <div class="inline-form">
      <textarea placeholder="Task title..." id="newCardInput" autofocus></textarea>
      <div class="inline-form-actions">
        <button class="btn btn-primary btn-sm" id="newCardAdd">Add task</button>
        <button class="btn-text btn-sm" id="newCardCancel">Cancel</button>
      </div>
    </div>
  `);
  setTimeout(()=> form.querySelector('#newCardInput').focus(), 0);
  form.querySelector('#newCardAdd').onclick = ()=>{
    const val = form.querySelector('#newCardInput').value.trim();
    if(val){
      project.tasks.push({id:uid('t'), columnId:col.id, title:val, priority:'med', assignees:[], due:null, comments:[]});
      pushToast(`Added "${val}"`);
    }
    newCardColumnId = null;
    render();
  };
  form.querySelector('#newCardCancel').onclick = ()=>{ newCardColumnId=null; render(); };
  return form;
}

function renderTaskCard(project, task){
  const today = new Date('2026-06-30');
  const isOverdue = task.due && new Date(task.due) < today;
  const card = el(`
    <div class="task-card" draggable="true">
      <div class="task-card-top">
        <div class="task-title">${escapeHtml(task.title)}</div>
        <div class="priority-tag priority-${task.priority}">${task.priority}</div>
      </div>
      <div class="task-meta">
        <div class="task-meta-left">
          ${task.due ? `<div class="task-due ${isOverdue?'overdue':''}">&#128197; ${formatDate(task.due)}</div>` : ''}
          ${task.comments.length ? `<div class="comment-count">&#128172; ${task.comments.length}</div>` : ''}
        </div>
        <div class="task-assignees"></div>
      </div>
    </div>
  `);
  const assigneesEl = card.querySelector('.task-assignees');
  task.assignees.forEach(uidv=>{
    const u = userById(uidv);
    assigneesEl.appendChild(el(`<div class="mini-avatar" style="background:${u.color}" title="${u.name}">${u.initials}</div>`));
  });

  card.addEventListener('dragstart', ()=>{ draggedTaskId = task.id; card.classList.add('dragging'); });
  card.addEventListener('dragend', ()=>{ draggedTaskId = null; card.classList.remove('dragging'); });
  card.addEventListener('click', ()=> openTaskModal(project, task));
  return card;
}

function formatDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

/* ================= MODALS ================= */
function openModal(node){
  const overlay = el(`<div class="overlay"></div>`);
  overlay.appendChild(node);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
  document.getElementById('app').appendChild(overlay);
  document.addEventListener('keydown', escListener);
}
function closeModal(){
  document.querySelectorAll('.overlay').forEach(o=>o.remove());
  document.removeEventListener('keydown', escListener);
}
function escListener(e){ if(e.key==='Escape') closeModal(); }

function openTaskModal(project, task){
  const modal = el(`
    <div class="modal">
      <div class="modal-header">
        <h3>Task details</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label class="field-label">Title</label>
          <input id="taskTitleInput" value="${escapeHtml(task.title)}">
        </div>
        <div class="field">
          <label class="field-label">Priority</label>
          <select id="taskPriority">
            <option value="low" ${task.priority==='low'?'selected':''}>Low</option>
            <option value="med" ${task.priority==='med'?'selected':''}>Medium</option>
            <option value="high" ${task.priority==='high'?'selected':''}>High</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label">Due date</label>
          <input id="taskDue" type="date" value="${task.due||''}">
        </div>
        <div class="field">
          <label class="field-label">Assignees</label>
          <div class="assignee-picker" id="assigneePicker"></div>
        </div>
        <div class="field">
          <label class="field-label">Comments</label>
          <div class="comment-list" id="commentList"></div>
          <div class="comment-input-row">
            <textarea id="newCommentInput" placeholder="Write a comment..."></textarea>
            <button class="btn btn-primary btn-sm" id="addCommentBtn">Post</button>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:18px;">
          <button class="btn-text" id="deleteTaskBtn" style="color:var(--red);">Delete task</button>
          <button class="btn btn-primary" id="saveTaskBtn">Save changes</button>
        </div>
      </div>
    </div>
  `);

  const picker = modal.querySelector('#assigneePicker');
  project.members.forEach(uidv=>{
    const u = userById(uidv);
    const selected = task.assignees.includes(uidv);
    const chip = el(`
      <div class="assignee-chip ${selected?'selected':''}" data-uid="${uidv}">
        <div class="mini-avatar" style="background:${u.color}">${u.initials}</div>
        <span>${u.name.split(' ')[0]}</span>
      </div>
    `);
    chip.onclick = ()=>{
      chip.classList.toggle('selected');
    };
    picker.appendChild(chip);
  });

  function renderComments(){
    const list = modal.querySelector('#commentList');
    list.innerHTML = task.comments.length===0 ? `<div style="font-size:12.5px;color:var(--muted)">No comments yet — start the discussion.</div>` : '';
    task.comments.forEach(c=>{
      const u = userById(c.userId);
      list.appendChild(el(`
        <div class="comment">
          <div class="mini-avatar" style="background:${u.color}">${u.initials}</div>
          <div class="comment-body">
            <div class="comment-head"><span class="comment-author">${u.name}</span><span class="comment-time">${c.time}</span></div>
            <div class="comment-text">${escapeHtml(c.text)}</div>
          </div>
        </div>
      `));
    });
  }
  renderComments();

  modal.querySelector('#addCommentBtn').onclick = ()=>{
    const input = modal.querySelector('#newCommentInput');
    const val = input.value.trim();
    if(val){
      task.comments.push({id:uid('cm'), userId: state.currentUser.id, text: val, time:'just now'});
      input.value='';
      renderComments();
      pushToast('Comment posted');
    }
  };

  modal.querySelector('.modal-close').onclick = closeModal;
  modal.querySelector('#deleteTaskBtn').onclick = ()=>{
    project.tasks = project.tasks.filter(t=>t.id!==task.id);
    closeModal();
    pushToast('Task deleted');
    render();
  };
  modal.querySelector('#saveTaskBtn').onclick = ()=>{
    task.title = modal.querySelector('#taskTitleInput').value.trim() || task.title;
    task.priority = modal.querySelector('#taskPriority').value;
    task.due = modal.querySelector('#taskDue').value || null;
    task.assignees = Array.from(modal.querySelectorAll('.assignee-chip.selected')).map(c=>c.dataset.uid);
    closeModal();
    pushToast('Task updated');
    render();
  };

  openModal(modal);
}

function openNewProjectModal(){
  const modal = el(`
    <div class="modal modal-small">
      <div class="modal-header"><h3>New project</h3><button class="modal-close">&times;</button></div>
      <div class="modal-body">
        <div class="field">
          <label class="field-label">Project name</label>
          <input id="projName" placeholder="Q3 Content Calendar">
        </div>
        <div class="field">
          <label class="field-label">Color</label>
          <div style="display:flex;gap:8px;" id="colorPicker"></div>
        </div>
        <button class="btn btn-primary auth-full-btn" id="createProjBtn">Create project</button>
      </div>
    </div>
  `);
  let chosenColor = PALETTE[0];
  const picker = modal.querySelector('#colorPicker');
  PALETTE.forEach(c=>{
    const dot = el(`<div style="width:26px;height:26px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${c===chosenColor?'var(--ink)':'transparent'};"></div>`);
    dot.onclick = ()=>{ chosenColor=c; picker.querySelectorAll('div').forEach(d=>d.style.border='2px solid transparent'); dot.style.border='2px solid var(--ink)'; };
    picker.appendChild(dot);
  });
  modal.querySelector('.modal-close').onclick = closeModal;
  modal.querySelector('#createProjBtn').onclick = ()=>{
    const name = modal.querySelector('#projName').value.trim();
    if(!name){ return; }
    const newProj = {
      id: uid('p'), name, color: chosenColor, members:[state.currentUser.id],
      columns:[
        {id:uid('c'), name:'Backlog', flag:'#6B6457'},
        {id:uid('c'), name:'In progress', flag:'#3457D5'},
        {id:uid('c'), name:'Done', flag:'#2F8F5B'},
      ],
      tasks:[]
    };
    state.projects.push(newProj);
    state.activeProjectId = newProj.id;
    closeModal();
    pushToast(`Created "${name}"`);
    render();
  };
  openModal(modal);
}

function openAddMemberModal(project){
  const modal = el(`
    <div class="modal modal-small">
      <div class="modal-header"><h3>Add member</h3><button class="modal-close">&times;</button></div>
      <div class="modal-body">
        <div class="assignee-picker" id="memberPicker"></div>
        <button class="btn btn-primary auth-full-btn" id="confirmMembersBtn" style="margin-top:18px;">Done</button>
      </div>
    </div>
  `);
  const picker = modal.querySelector('#memberPicker');
  USERS.forEach(u=>{
    const selected = project.members.includes(u.id);
    const chip = el(`
      <div class="assignee-chip ${selected?'selected':''}" data-uid="${u.id}">
        <div class="mini-avatar" style="background:${u.color}">${u.initials}</div>
        <span>${u.name}</span>
      </div>
    `);
    chip.onclick = ()=> chip.classList.toggle('selected');
    picker.appendChild(chip);
  });
  modal.querySelector('.modal-close').onclick = closeModal;
  modal.querySelector('#confirmMembersBtn').onclick = ()=>{
    project.members = Array.from(picker.querySelectorAll('.selected')).map(c=>c.dataset.uid);
    closeModal();
    pushToast('Members updated');
    render();
  };
  openModal(modal);
}

function openActivityModal(){
  const allActivity = [
    {text:'Aisha Patel completed "Set up analytics events"', time:'1 hour ago', color:'#2F8F5B'},
    {text:'Liam Brooks commented on "Build pricing page"', time:'3 hours ago', color:'#3457D5'},
    {text:'Maya Chen created project "Mobile App v2"', time:'yesterday', color:'#D6643C'},
    {text:'Diego Ruiz was assigned to "Spec offline sync behavior"', time:'2 days ago', color:'#7E57C2'},
  ];
  const modal = el(`
    <div class="modal">
      <div class="modal-header"><h3>Workspace activity</h3><button class="modal-close">&times;</button></div>
      <div class="modal-body">
        <div class="activity-feed">
          ${allActivity.map(a=>`
            <div class="activity-item">
              <div class="activity-dot" style="background:${a.color}"></div>
              <div class="activity-text">
                <div>${a.text}</div>
                <div class="activity-time">${a.time}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `);
  modal.querySelector('.modal-close').onclick = closeModal;
  openModal(modal);
}

/* ================= INIT ================= */
render();
</script>
</body>
</html>
